# Finetuning Configuration
# Usage: ./finetune.sh gemma4 --all

# Default model
default_model: gemma4

# Model configurations (mirror configs/*.yaml structure so fallback works)
models:
  gemma4:
    model:
      name: unsloth/gemma-4-E4B-it
      target_modules: all-linear
      r: 32
      lora_alpha: 64
      lora_dropout: 0
      bias: none
      max_seq_length: 4096
      batch_size: 1
      load_in_4bit: false
      use_gradient_checkpointing: unsloth
    training:
      num_train_epochs: 3
      learning_rate: 1.0e-4
      warmup_ratio: 0.05
      gradient_accumulation_steps: 4
      optim: adamw_8bit
      seed: 3407
      save_strategy: steps
      save_steps: 100
      save_total_limit: 2
      eval_strategy: steps
      eval_steps: 100
      load_best_model_at_end: true
      metric_for_best_model: eval_loss

  qwen35:
    model:
      name: unsloth/Qwen3.5-9B
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      r: 32
      lora_alpha: 64
      lora_dropout: 0
      bias: none
      max_seq_length: 4096
      batch_size: 1
      load_in_4bit: true
      use_gradient_checkpointing: unsloth
    training:
      num_train_epochs: 3
      learning_rate: 1.0e-4
      warmup_ratio: 0.05
      gradient_accumulation_steps: 8
      optim: adamw_8bit
      seed: 3407
      save_strategy: steps
      save_steps: 100
      save_total_limit: 2
      eval_strategy: steps
      eval_steps: 100
      load_best_model_at_end: true
      metric_for_best_model: eval_loss

  qwen35-4b:
    model:
      name: unsloth/Qwen3.5-4B
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      r: 8
      lora_alpha: 16
      lora_dropout: 0
      bias: none
      max_seq_length: 4096
      batch_size: 1
      load_in_4bit: true
      use_gradient_checkpointing: unsloth
    training:
      num_train_epochs: 3
      learning_rate: 1.0e-4
      warmup_ratio: 0.05
      gradient_accumulation_steps: 4
      optim: adamw_8bit
      seed: 3407
      save_strategy: steps
      save_steps: 100
      save_total_limit: 2
      eval_strategy: steps
      eval_steps: 100
      load_best_model_at_end: true
      metric_for_best_model: eval_loss

# Data configuration
data:
  raw_dir: data/raw
  processed_dir: data/processed
  merged_dir: data/merged
  merged_file: data/merged/train.jsonl

# Colab configuration
colab:
  gpu: T4
  session_prefix: finetune
