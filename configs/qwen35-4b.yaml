# Default: quality mode (r=32, alpha=64). Fast mode (r=8, alpha=16) is
# controlled by the notebook MODEL_CONFIGS dict; override via --mode fast.
# Qwen 3.5 4B Configuration
# Smaller alternative to Qwen 3.5 9B, works great on T4
model:
  name: unsloth/Qwen3.5-4B
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  r: 8
  lora_alpha: 16
  lora_dropout: 0
  bias: none
  max_seq_length: 4096
  batch_size: 1
  load_in_4bit: true
  use_rslora: false
  use_gradient_checkpointing: unsloth

training:
  num_train_epochs: 3
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  gradient_accumulation_steps: 4
  optim: adamw_8bit
  seed: 3407
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  eval_strategy: steps
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
