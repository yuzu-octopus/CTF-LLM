# Ornith 1.0 9B Configuration — post-trained from Qwen 3.5 by DeepReinforce
# MIT license, 262K context, Qwen-based chat template
# Unsloth-compatible via FastLanguageModel with 4-bit QLoRA on T4
model:
  name: deepreinforce-ai/Ornith-1.0-9B
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  r: 32
  lora_alpha: 32
  lora_dropout: 0
  bias: none
  max_seq_length: 4096
  batch_size: 1
  load_in_4bit: true
  use_rslora: true
  use_gradient_checkpointing: unsloth

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.001
  max_grad_norm: 0.3
  lr_scheduler_type: cosine
  neftune_noise_alpha: 5
  gradient_accumulation_steps: 4
  optim: adamw_8bit
  seed: 3407
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  eval_strategy: steps
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
