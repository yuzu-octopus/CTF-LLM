# Qwen 3.5 9B Configuration
# QLoRA with load_in_4bit=True works on T4 (~6GB weights)
model:
  name: unsloth/Qwen3.5-9B
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  bias: none
  max_seq_length: 4096
  batch_size: 1
  load_in_4bit: true
  use_gradient_checkpointing: unsloth

training:
  num_train_epochs: 3
  learning_rate: 2e-4
  warmup_steps: 10
  gradient_accumulation_steps: 4
  optim: adamw_8bit
  seed: 3407
  save_total_limit: 1
  eval_strategy: steps
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
