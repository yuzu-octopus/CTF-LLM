# Gemma 4 12B Unified Configuration
# Encoder-free multimodal (text + image + audio), 256K context
# 4-bit QLoRA on T4 16GB (tight: ~10-12GB with LoRA + optimizer)
# Model: google/gemma-4-12B-it (no pre-quantized variant from Unsloth)
model:
  name: google/gemma-4-12B-it
  target_modules: all-linear
  r: 32
  lora_alpha: 64
  lora_dropout: 0
  bias: none
  max_seq_length: 4096
  batch_size: 1
  load_in_4bit: true
  use_gradient_checkpointing: unsloth

training:
  num_train_epochs: 3
  learning_rate: 1.0e-4
  warmup_ratio: 0.05
  gradient_accumulation_steps: 8
  optim: adamw_8bit
  seed: 3407
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  eval_strategy: steps
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
