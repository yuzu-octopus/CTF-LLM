# Default: quality mode (r=32, alpha=32). Fast mode (r=8, alpha=8) is
# controlled by the notebook MODEL_CONFIGS dict; override via --mode fast.
# Gemma 4 12B Unified Configuration — Unsloth recommended: alpha == r (1:1)
# Encoder-free multimodal (text + image + audio), 256K context
# 4-bit QLoRA on T4 16GB (tight: ~10-12GB with LoRA + optimizer)
# Model: google/gemma-4-12B-it (no pre-quantized variant from Unsloth)
model:
  name: google/gemma-4-12B-it
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  r: 32
  lora_alpha: 32
  lora_dropout: 0
  bias: none
  max_seq_length: 4096
  batch_size: 1
  load_in_4bit: true
  use_rslora: false
  use_gradient_checkpointing: unsloth

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  weight_decay: 0.001
  max_grad_norm: 0.3
  lr_scheduler_type: cosine
  neftune_noise_alpha: 5
  gradient_accumulation_steps: 8
  optim: adamw_8bit
  seed: 3407
  save_strategy: steps
  save_steps: 100
  save_total_limit: 2
  eval_strategy: steps
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
