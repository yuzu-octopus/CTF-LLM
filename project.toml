[[sections]]
id = "pipeline"
type = "workflow"
title = "Pipeline"
icon = "rocket"

[[sections.items]]
title = "Scrape Writeups"
body = "Collects CTF writeups from 13 GitHub repos, parses flag formats and solution approaches."

[[sections.items]]
title = "Process to ChatML"
body = "Converts raw writeups and HuggingFace datasets into structured ChatML training examples."

[[sections.items]]
title = "Train with QLoRA"
body = "4-bit QLoRA fine-tuning via Unsloth on Colab T4 GPU — Fast (rank 8, ~30 min) or Quality (rank 32, ~100 min)."

[[sections.items]]
title = "Evaluate"
body = "Runs against a 210-question benchmark across pwn, rev, crypto, web at easy/medium/hard."

[[sections.items]]
title = "Analyze"
body = "Wilson 95% CI, McNemar's test, contamination checks, and cheating detection."

[[sections]]
id = "notice"
type = "notice"
title = "Hardware Note"
icon = "info"
notice_type = "info"
body = """
<p>All training runs on a <strong>free Google Colab T4 GPU</strong> (16GB VRAM).
The 4-bit QLoRA quantization makes this possible — no paid tier required.</p>
"""

[[sections]]
id = "benchmark"
type = "text"
title = "Benchmark"
icon = "document"
body = """
<p><strong style="color:var(--purple);">210 questions</strong> across 4 categories and 3 difficulty levels.</p>
<ul style="list-style:none;padding:0;">
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Categories</strong> &mdash; pwn (57), rev (50), crypto (50), web (53)</li>
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Difficulties</strong> &mdash; easy (72), medium (79), hard (59)</li>
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Task types</strong> &mdash; flag_extraction, multiple_choice, code_generation, vulnerability_identification, patch_generation, exploit_trace</li>
  <li style="padding:8px 0;"><strong style="color:var(--purple);">Statistical rigor</strong> &mdash; Wilson 95% CI (&plusmn;6.8%), McNemar's test, contamination check, cheating detection</li>
</ul>
"""

[[sections]]
id = "quickstart"
type = "code_block"
title = "Quick Start"
icon = "play"
language = "bash"
code = """
# Install dependencies
uv sync

# Run full pipeline (build data + train)
./finetune.sh gemma4 --all

# Evaluate trained model
./finetune.sh gemma4 --eval
"""

[[sections]]
id = "notebook"
type = "code_block"
title = "Notebook Generation"
icon = "gear"
language = "bash"
code = """
# The Colab notebook is auto-generated — never edit it directly.
# It bakes all src/*.py + configs/*.yaml into a decode cell.

# Regenerate:
python3 scripts/generate_notebook.py

# The notebook decodes all files to /content/ on Colab at runtime
# and imports from src/ for every operation — zero code duplication.
"""

