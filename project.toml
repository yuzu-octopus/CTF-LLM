[project]
name = "CTF-LLM"
tagline = "Fine-tune LLMs to solve CTF challenges"
subtitle = "End-to-end pipeline for fine-tuning open-source LLMs (Gemma 4, Qwen 3.5) on cybersecurity CTF challenges using Unsloth + QLoRA on Google Colab's free T4 GPU."
description = "End-to-end pipeline for fine-tuning open-source LLMs on CTF challenges and competitive programming using Unsloth + QLoRA on Google Colab T4."
github_url = "https://github.com/yuzu-octopus/CTF-LLM"
page_url = "https://yuzu-octopus.github.io/CTF-LLM/"
quickstart_url = "#quickstart"
logo_svg = """
