[[sections]]
id = "benchmark"
type = "text"
title = "Benchmark"
icon = "document"
body = """
<p><strong style="color:var(--purple);">210 questions</strong> across 4 categories and 3 difficulty levels.</p>
<ul class="stats" style="list-style:none;padding:0;">
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Categories</strong> &mdash; pwn (57), rev (50), crypto (50), web (53)</li>
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Difficulties</strong> &mdash; easy (72), medium (79), hard (59)</li>
  <li style="padding:8px 0;border-bottom:1px solid var(--muted);"><strong style="color:var(--purple);">Task types</strong> &mdash; flag_extraction, multiple_choice, code_generation, vulnerability_identification, patch_generation, exploit_trace</li>
  <li style="padding:8px 0;"><strong style="color:var(--purple);">Statistical rigor</strong> &mdash; Wilson 95% CI (±6.8%), McNemar's test, contamination check, cheating detection</li>
</ul>
"""

[[sections]]
id = "quickstart"
type = "code_block"
title = "Quick Start"
icon = "play"
code = """
# Install dependencies
uv sync

# Run full pipeline (build data + train)
./finetune.sh gemma4 --all

# Evaluate trained model
./finetune.sh gemma4 --eval
"""

[[sections]]
id = "notebook"
type = "code_block"
title = "Notebook Generation"
icon = "play"
code = """
# The Colab notebook is auto-generated — never edit it directly.
# It bakes all src/*.py + configs/*.yaml into a decode cell.

# Regenerate:
python3 scripts/generate_notebook.py

# The notebook decodes all files to /content/ on Colab at runtime
# and imports from src/ for every operation — zero code duplication.
"""

