[project]
name = "CTF-LLM"
tagline = "Fine-tune LLMs to solve CTF challenges"
subtitle = "End-to-end pipeline for fine-tuning open-source LLMs (Gemma 4, Qwen 3.5, Ornith 1.0) on cybersecurity CTF challenges using Unsloth + QLoRA on Google Colab's free T4 GPU."
description = "End-to-end pipeline for fine-tuning open-source LLMs (Gemma 4, Qwen 3.5, Ornith 1.0) on CTF challenges and competitive programming using Unsloth + QLoRA on Google Colab T4."
github_url = "https://github.com/yuzu-octopus/CTF-LLM"
page_url = "https://yuzu-octopus.github.io/CTF-LLM/"
logo_svg = """
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="var(--panel)"/>
  <path d="M20 24 L28 32 L20 40" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="48,22 50,26 54,28 50,30 48,34 46,30 42,28 46,26" fill="var(--purple)"/>
  <polygon points="34,14 36,17 38,18 36,19 34,22 32,19 30,18 32,17" fill="var(--green)"/>
  <polygon points="54,15 55,17 57,18 55,19 54,21 53,19 51,18 53,17" fill="var(--pink)"/>
</svg>"""

[brand]
tagline = "fine-tune · CTF · qLoRA"

[[sections]]
id = "features"
type = "features"
title = "Features"
icon = "grid"

[[sections.items]]
title = "End-to-end Pipeline"
body = "Scrapes CTF writeups from 13 GitHub repos, downloads curated HuggingFace datasets, processes to ChatML, trains with Unsloth QLoRA, evaluates on a 210-question benchmark."

[[sections.items]]
title = "5 Models Supported"
body = "Gemma 4 E4B, Gemma 4 12B, Qwen 3.5 9B, Qwen 3.5 4B, Ornith 1.0 9B — all running 4-bit QLoRA on a free T4 GPU (16GB VRAM)."

[[sections.items]]
title = "210-Question Benchmark"
body = "Curated evaluation set across 4 categories (pwn, rev, crypto, web) and 3 difficulty levels with Wilson 95% CI, McNemar's paired test, and contamination checking."

[[sections.items]]
title = "Colab-Ready"
body = "Single finetune.sh handles session creation, dependency install, file upload, training, and model download — zero manual Colab UI interaction."

[[sections]]
id = "models"
type = "table"
title = "Supported Models (5)"
